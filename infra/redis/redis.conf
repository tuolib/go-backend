# Redis 7 Configuration — Tuned for E-commerce Workload

# ── Memory ──
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Persistence ──
# Disable RDB snapshots (AOF is primary)
save ""

# Enable AOF
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── Networking ──
bind 0.0.0.0
timeout 0
tcp-keepalive 300

# ── Logging ──
loglevel notice

# ── Clients ──
maxclients 10000

# ── Lua scripting ──
lua-time-limit 5000

# ── Slow log ──
slowlog-log-slower-than 10000
slowlog-max-len 128
