services:
  # ── Infrastructure ──
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./infra/postgres/postgresql.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: ecommerce-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api-gateway:
        condition: service_healthy

  # ── Application Services ──
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: user
    container_name: ecommerce-user
    restart: unless-stopped
    environment:
      USER_SERVICE_PORT: "3001"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ecommerce?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-access-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-change-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-168h}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-your-internal-secret-change-in-production}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    expose:
      - "3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--post-data={}", "http://localhost:3001/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  product-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: product
    container_name: ecommerce-product
    restart: unless-stopped
    environment:
      PRODUCT_SERVICE_PORT: "3002"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ecommerce?sslmode=disable
      REDIS_URL: redis://redis:6379
      INTERNAL_SECRET: ${INTERNAL_SECRET:-your-internal-secret-change-in-production}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    expose:
      - "3002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--post-data={}", "http://localhost:3002/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  cart-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: cart
    container_name: ecommerce-cart
    restart: unless-stopped
    environment:
      CART_SERVICE_PORT: "3003"
      REDIS_URL: redis://redis:6379
      PRODUCT_SERVICE_URL: http://product-service:3002
      INTERNAL_SECRET: ${INTERNAL_SECRET:-your-internal-secret-change-in-production}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    expose:
      - "3003"
    depends_on:
      redis:
        condition: service_healthy
      product-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--post-data={}", "http://localhost:3003/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  order-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: order
    container_name: ecommerce-order
    restart: unless-stopped
    environment:
      ORDER_SERVICE_PORT: "3004"
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/ecommerce?sslmode=disable
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      INTERNAL_SECRET: ${INTERNAL_SECRET:-your-internal-secret-change-in-production}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    expose:
      - "3004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--post-data={}", "http://localhost:3004/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: gateway
    container_name: ecommerce-gateway
    restart: unless-stopped
    environment:
      API_GATEWAY_PORT: "3000"
      REDIS_URL: redis://redis:6379
      USER_SERVICE_URL: http://user-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3004
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-your-access-secret-change-in-production}
      INTERNAL_SECRET: ${INTERNAL_SECRET:-your-internal-secret-change-in-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
      user-service:
        condition: service_healthy
      product-service:
        condition: service_healthy
      cart-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "--post-data={}", "http://localhost:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  pg_data:
  redis_data:
  caddy_data:
  caddy_config:
